content: |
  My early work in athletic training and at [Stanford Sports Medicine Lab](https://stanfordhealthcare.org/medical-clinics/sports-medicine-clinic.html){:target="_blank"} initially drew me toward biomechanics and pre-med. As I began working on assistive robotics in college, however, I found myself more <span style="background-color: #FAA152; padding: 2px 4px; border-radius: 2px;">captivated by solving the challenge of creating adaptive systems that work at and alongside human capability in open, real-world environments.</span> I am especially interested in tackling this through robotic manipulation. 